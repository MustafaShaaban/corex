# Corex — development stack (spec 028 / DECISIONS #62).
#
# One command brings up WordPress with the Corex monorepo mapped in, a database, a cache,
# and a mail catcher:  docker compose up -d
#
# These services are a DEVELOPMENT CONVENIENCE — they are NOT framework runtime dependencies
# (redis/mailpit are optional; Corex degrades without them). See docs/en/05-deployment/docker.md.
services:
  web:
    image: nginx:1.27-alpine
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
      - wp_core:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [corex]

  php:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      COREX_SITE_URL: "http://localhost:8080"
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: corex
      WORDPRESS_DB_USER: corex
      WORDPRESS_DB_PASSWORD: corex
      WORDPRESS_TABLE_PREFIX: cx_
    volumes:
      - wp_core:/var/www/html          # WordPress core (managed by the entrypoint)
      - .:/repo:cached                 # the monorepo — symlinked into wp-content by the entrypoint
    networks: [corex]

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: corex
      MARIADB_USER: corex
      MARIADB_PASSWORD: corex
      MARIADB_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [corex]

  # Optional dev conveniences — never framework dependencies.
  cache:
    image: redis:7-alpine
    networks: [corex]

  mail:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"   # web UI — every email the dev site "sends" lands here
    networks: [corex]

volumes:
  wp_core:
  db_data:

networks:
  corex:
