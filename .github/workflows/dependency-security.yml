name: Dependency Security

on:
  pull_request:
    branches: [main, develop]
    paths:
      - package.json
      - package-lock.json
      - composer.json
      - composer.lock
      - docs-app/package.json
      - docs-app/package-lock.json
      - .github/dependency-security-policy.json
      - .github/workflows/dependency-security.yml
      - scripts/dependency-security-policy.mjs
      - scripts/verify-dependency-security.mjs
  schedule:
    - cron: '17 4 * * 3'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Validate dependency advisories
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Validate dependency security policy
        run: npm run verify:dependencies
