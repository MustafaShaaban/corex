name: CI

on:
  push:
    branches: [main, develop]
  # Every pull request, whatever its base. Filtering to [main, develop] meant a stacked PR — one
  # whose base is another feature branch — never ran CI at all, and GitHub renders "no checks" the
  # same way it renders "all checks passed". Spec 072's stack sat queued for merge that way with
  # eight real unit failures in it (DECISIONS #153).
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Lint + headless tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3']
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Lint PHP source
        run: find plugins packages addons -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Headless unit tests (Pest)
        run: composer test

  js:
    name: JS unit tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Covers the block/admin JS *and* the generated-artifact contracts — the token inventory
      # test regenerates from source and fails if a committed artifact drifted. Nothing in CI ran
      # this suite before, which is how a stale inventory survived spec 072's CSS additions
      # unnoticed while the gate reported every suite green.
      - name: JS unit tests (Jest)
        run: npm run test:js

  # The integration suite boots the framework inside a real WordPress (tests/bootstrap-integration
  # requires ./wp/wp-load.php), so CI has to provision one. This mirrors scripts/setup-wordpress.ps1
  # — the documented local setup — step for step, with symlinks where that script uses junctions.
  integration:
    name: Integration tests (real WordPress)
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: corex
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15
    steps:
      - uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mysqli, zip
          tools: composer:v2, wp-cli
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Download WordPress
        run: wp core download --path=wp --version=latest

      - name: Configure and install WordPress
        run: |
          wp config create --path=wp --dbname=corex --dbuser=root --dbpass=root \
            --dbhost=127.0.0.1 --dbprefix=cx_ --skip-check
          wp core install --path=wp --url=http://localhost --title=Corex \
            --admin_user=admin --admin_password=changeme --admin_email=admin@example.com \
            --skip-email

      # Same mapping the local script makes: the monorepo IS the source, wp-content only points at it.
      - name: Link the monorepo into wp-content
        run: |
          ln -sfn "$PWD/theme" wp/wp-content/themes/corex
          for dir in plugins/*/; do
            ln -sfn "$PWD/${dir%/}" "wp/wp-content/plugins/$(basename "$dir")"
          done
          # Add-ons are plugin-shaped packages; link the ones carrying a top-level PHP file.
          for dir in addons/*/; do
            if compgen -G "${dir}*.php" > /dev/null; then
              ln -sfn "$PWD/${dir%/}" "wp/wp-content/plugins/$(basename "$dir")"
            fi
          done

      - name: Activate the theme and plugins
        run: |
          wp theme activate corex --path=wp
          # corex-core first. The others declare "Requires Plugins: corex-core", and WP-CLI
          # activates in the order it is given — alphabetically that puts corex-blocks and
          # corex-config ahead of corex-core, and both refuse with an unmet requirement.
          wp plugin activate corex-core --path=wp
          # Then everything else that was linked, add-ons included. The local script activates only
          # plugins/*, but a long-lived dev install has the add-ons switched on too, and the
          # integration suite resolves their services from the container — without them the Bookings,
          # Careers, Newsletter and Profile tests fail on BindingResolutionException.
          wp plugin activate --all --path=wp
          wp plugin list --path=wp --status=active --field=name

      - name: Integration tests (Pest, real WordPress)
        run: composer test:integration

# Not yet wired here (tracked in CONTRIBUTING.md):
#   - The guard gates (clean-code/wp/test/docs) are run by the coding agent on each diff
#     per the constitution; a CI shim can enforce them once a runner exists.
#   - PHPCS (WordPress-Extra) + ESLint (@wordpress) once their configs are added.
